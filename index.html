<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tayanti · Panel de Reservas</title>
<link rel="icon" type="image/jpeg" href="assets/logo.jpg" />
<link rel="apple-touch-icon" href="assets/logo.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div id="login">
  <form class="login-card" id="loginForm">
    <img src="assets/logo.jpg" alt="Tayanti" />
    <h1>Tayanti</h1>
    <div class="tag">Panel de reservas</div>
    <div class="field"><label>Correo</label><input type="email" id="email" autocomplete="username" required /></div>
    <div class="field"><label>Contraseña</label><input type="password" id="password" autocomplete="current-password" required /></div>
    <button class="primary" type="submit" id="loginBtn">Ingresar</button>
    <div class="error" id="loginError"></div>
  </form>
</div>

<div id="app" hidden>
  <div class="topbar">
    <div class="brand">
      <img src="assets/logo.jpg" alt="Tayanti" />
      <div><h1>Tayanti</h1><div class="tag">Panel de reservas</div></div>
    </div>
    <div class="top-right">
      <div class="live"><span class="live-dot"></span><span class="txt">En vivo</span></div>
      <button class="ghost" id="logoutBtn">Cerrar sesión</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="grid2">
    <div class="panel" style="animation-delay:.12s">
      <h3>Reservas por día</h3><div class="sub">Últimos 14 días</div>
      <div class="chart-wrap"><canvas id="chartDias"></canvas></div>
    </div>
    <div class="panel" style="animation-delay:.18s">
      <h3>Por estado</h3><div class="sub">Hoy y próximas</div>
      <div class="chart-wrap" style="height:200px"><canvas id="chartEstado"></canvas></div>
      <div class="legend" id="estadoLegend"></div>
    </div>
  </div>

  <div class="panel" style="animation-delay:.24s">
    <div class="panel-head">
      <div>
        <h3>Reservas</h3>
        <div class="sub" id="tablaSub">Ordenadas por fecha y hora</div>
      </div>
      <div class="filtros" id="filtros"></div>
    </div>
    <div class="table-scroll" id="tablaWrap"></div>
    <div class="updated" id="updated"></div>
  </div>

  <div class="footer">Tayanti · Panel interno de reservas<span class="sep">·</span>Actualización automática en tiempo real</div>
</div>

<div id="modal" class="modal-overlay" hidden>
  <div class="modal-card">
    <h3 id="modalTitle">Confirmar</h3>
    <p id="modalMsg"></p>
    <div class="modal-actions">
      <button class="m-ghost" id="modalCancel">No</button>
      <button class="m-ok" id="modalOk">Sí</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
