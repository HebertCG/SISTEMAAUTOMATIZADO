<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tayanti · Panel de Reservas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F4F2ED; --surface: #FFFFFF; --surface-2: #FAF8F4;
    --line: #E7E2D8; --line-soft: #EFEBE3;
    --accent: #9C6F28; --accent-soft: #C99B4E; --accent-bg: #F6EEDD;
    --text: #211F1B; --muted: #8A847A;
    --green: #1D8B68; --green-bg: #E4F3EC;
    --amber: #B07D17; --amber-bg: #F8EED7;
    --red: #C0563D; --red-bg: #F8E7E1;
    --shadow: 0 1px 3px rgba(33,31,27,0.04), 0 1px 2px rgba(33,31,27,0.05);
    --shadow-lg: 0 8px 24px rgba(33,31,27,0.08);
    --ease: cubic-bezier(.16,1,.3,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; line-height: 1.5; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop { 0% { transform: scale(.96); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .muted { color: var(--muted); }

  /* Login */
  #login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-card { width: 100%; max-width: 390px; background: var(--surface); border: 1px solid var(--line); border-radius: 20px; padding: 40px 34px; text-align: center; box-shadow: var(--shadow-lg); animation: pop .55s var(--ease) both; }
  .login-card img { width: 76px; height: 76px; border-radius: 18px; object-fit: cover; margin-bottom: 16px; border: 1px solid var(--line); }
  .login-card h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.4px; }
  .login-card .tag { color: var(--accent); font-size: 11px; margin: 4px 0 28px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600; }
  .field { text-align: left; margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  input { width: 100%; height: 46px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 11px; color: var(--text); padding: 0 14px; font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s var(--ease), box-shadow .2s var(--ease); }
  input:focus { border-color: var(--accent-soft); box-shadow: 0 0 0 3px var(--accent-bg); }
  button.primary { width: 100%; height: 48px; margin-top: 8px; background: var(--accent); color: #fff; border: none; border-radius: 11px; font-weight: 600; font-size: 14px; cursor: pointer; font-family: inherit; letter-spacing: 0.3px; transition: background .2s var(--ease), transform .12s var(--ease), box-shadow .2s var(--ease); }
  button.primary:hover { background: #835C1F; box-shadow: 0 6px 16px rgba(156,111,40,0.28); transform: translateY(-1px); }
  button.primary:active { transform: translateY(0) scale(.99); }
  button.primary:disabled { opacity: .6; cursor: default; transform: none; box-shadow: none; }
  .error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 18px; }

  /* App */
  #app { max-width: 1200px; margin: 0 auto; padding: 26px 22px 60px; animation: fadeIn .4s ease both; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; animation: fadeUp .5s var(--ease) both; }
  .brand { display: flex; align-items: center; gap: 13px; }
  .brand img { width: 46px; height: 46px; border-radius: 12px; object-fit: cover; border: 1px solid var(--line); }
  .brand h1 { font-size: 21px; font-weight: 800; line-height: 1; letter-spacing: -0.3px; }
  .brand .tag { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-top: 3px; }
  .top-right { display: flex; align-items: center; gap: 14px; }
  .live { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); font-weight: 500; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(29,139,104,0.45); } 70% { box-shadow: 0 0 0 7px rgba(29,139,104,0); } 100% { box-shadow: 0 0 0 0 rgba(29,139,104,0); } }
  .ghost { background: var(--surface); color: var(--muted); border: 1px solid var(--line); border-radius: 10px; height: 38px; padding: 0 15px; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; transition: color .2s var(--ease), border-color .2s var(--ease), transform .12s var(--ease); }
  .ghost:hover { color: var(--text); border-color: var(--accent-soft); transform: translateY(-1px); }

  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .kpi { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow); animation: fadeUp .55s var(--ease) both; transition: transform .25s var(--ease), box-shadow .25s var(--ease); }
  .kpi:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  .kpi .label { font-size: 12.5px; color: var(--muted); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .kpi .label .ic { width: 30px; height: 30px; border-radius: 9px; background: var(--accent-bg); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .kpi .value { font-size: 34px; font-weight: 800; line-height: 1.1; margin-top: 12px; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
  .kpi .value.amber { color: var(--amber); }
  .kpi .value.green { color: var(--green); }

  .grid2 { display: grid; grid-template-columns: 1.7fr 1fr; gap: 16px; margin-bottom: 18px; }
  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; padding: 20px 22px; box-shadow: var(--shadow); animation: fadeUp .55s var(--ease) both; }
  .panel h3 { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
  .panel .sub { font-size: 12px; color: var(--muted); margin: 2px 0 16px; }
  .chart-wrap { position: relative; width: 100%; height: 240px; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--muted); margin-top: 14px; }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 640px; }
  thead th { text-align: left; font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--muted); font-weight: 600; padding: 0 14px 12px; border-bottom: 1px solid var(--line); }
  tbody td { padding: 13px 14px; font-size: 14px; border-bottom: 1px solid var(--line-soft); }
  tbody tr { transition: background .18s var(--ease); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface-2); }
  .name { font-weight: 600; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 4px 11px; border-radius: 20px; }
  .b-pendiente { background: var(--amber-bg); color: var(--amber); }
  .b-confirmada { background: var(--green-bg); color: var(--green); }
  .b-cancelada { background: var(--red-bg); color: var(--red); }
  .b-completada { background: var(--accent-bg); color: var(--accent); }
  .b-no_show { background: #EFECE6; color: var(--muted); }
  .empty { text-align: center; color: var(--muted); padding: 36px; font-size: 14px; }
  .updated { font-size: 11px; color: var(--muted); text-align: right; margin-top: 16px; }
  .footer { text-align: center; color: var(--muted); font-size: 11px; margin-top: 32px; letter-spacing: 0.4px; opacity: .75; }
  .footer .sep { margin: 0 7px; opacity: .5; }

  .acciones { display: flex; gap: 6px; }
  .btn-act { font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 8px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); cursor: pointer; font-family: inherit; white-space: nowrap; transition: background .15s var(--ease), border-color .15s var(--ease), transform .12s var(--ease); }
  .btn-act:hover { transform: translateY(-1px); }
  .btn-act:active { transform: translateY(0) scale(.97); }
  .btn-act:disabled { opacity: .45; cursor: default; transform: none; }
  .btn-act.confirmar { color: var(--green); background: var(--green-bg); border-color: #BFE3D2; }
  .btn-act.confirmar:hover { background: #D5EEE2; }
  .btn-act.completar { color: var(--accent); background: var(--accent-bg); border-color: #E4D0A7; }
  .btn-act.completar:hover { background: #F1E4C9; }
  .btn-act.cancelar { color: var(--red); background: var(--red-bg); border-color: #ECCBC1; }
  .btn-act.cancelar:hover { background: #F2DAD1; }
  .acciones-none { color: var(--muted); opacity: .5; }

  @media (max-width: 820px) { .grid2 { grid-template-columns: 1fr; } .kpi .value { font-size: 30px; } }
  @media (max-width: 540px) { #app { padding: 18px 14px 40px; } .brand h1 { font-size: 19px; } .live span.txt { display: none; } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>

<div id="login">
  <form class="login-card" id="loginForm">
    <img src="https://uzzwrfexstoyxfzaxdlb.supabase.co/storage/v1/object/public/publico/images.jpg" alt="Tayanti" />
    <h1>Tayanti</h1>
    <div class="tag">Panel de reservas</div>
    <div class="field"><label>Correo</label><input type="email" id="email" autocomplete="username" required /></div>
    <div class="field"><label>Contraseña</label><input type="password" id="password" autocomplete="current-password" required /></div>
    <button class="primary" type="submit" id="loginBtn">Ingresar</button>
    <div class="error" id="loginError"></div>
  </form>
</div>

<div id="app" hidden>
  <div class="topbar">
    <div class="brand">
      <img src="https://uzzwrfexstoyxfzaxdlb.supabase.co/storage/v1/object/public/publico/images.jpg" alt="Tayanti" />
      <div><h1>Tayanti</h1><div class="tag">Panel de reservas</div></div>
    </div>
    <div class="top-right">
      <div class="live"><span class="live-dot"></span><span class="txt">En vivo</span></div>
      <button class="ghost" id="logoutBtn">Cerrar sesión</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="grid2">
    <div class="panel" style="animation-delay:.12s">
      <h3>Reservas por día</h3><div class="sub">Últimos 14 días</div>
      <div class="chart-wrap"><canvas id="chartDias"></canvas></div>
    </div>
    <div class="panel" style="animation-delay:.18s">
      <h3>Por estado</h3><div class="sub">Distribución actual</div>
      <div class="chart-wrap" style="height:200px"><canvas id="chartEstado"></canvas></div>
      <div class="legend" id="estadoLegend"></div>
    </div>
  </div>

  <div class="panel" style="animation-delay:.24s">
    <h3>Próximas reservas</h3><div class="sub">Ordenadas por fecha y hora</div>
    <div class="table-scroll" id="tablaWrap"></div>
    <div class="updated" id="updated"></div>
  </div>

  <div class="footer">Tayanti · Panel interno de reservas<span class="sep">·</span>Actualización automática en tiempo real</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://uzzwrfexstoyxfzaxdlb.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_22PTWGC7kWEGvBdUjbM-Rw_Ep25qS5E';

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = (id) => document.getElementById(id);
let chartDias, chartEstado, intervalo, canalRT, kpisBuilt = false;

const ESTADOS = {
  pendiente:  { label: 'Pendiente',  color: '#B07D17' },
  confirmada: { label: 'Confirmada', color: '#1D8B68' },
  cancelada:  { label: 'Cancelada',  color: '#C0563D' },
  completada: { label: 'Completada', color: '#9C6F28' },
  no_show:    { label: 'No asistió', color: '#8A847A' },
};

function showApp(on) {
  $('app').hidden = !on;
  $('login').style.display = on ? 'none' : 'flex';
  if (on) iniciarTiempoReal(); else detenerTiempoReal();
}

async function init() {
  const { data } = await sb.auth.getSession();
  if (data.session) { showApp(true); cargar(); } else { showApp(false); }
}

$('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  $('loginError').textContent = '';
  $('loginBtn').disabled = true; $('loginBtn').textContent = 'Ingresando…';
  const { error } = await sb.auth.signInWithPassword({ email: $('email').value.trim(), password: $('password').value });
  $('loginBtn').disabled = false; $('loginBtn').textContent = 'Ingresar';
  if (error) { $('loginError').textContent = 'Correo o contraseña incorrectos.'; return; }
  showApp(true); cargar();
});

$('logoutBtn').addEventListener('click', async () => { await sb.auth.signOut(); showApp(false); });

function iniciarTiempoReal() {
  if (!intervalo) intervalo = setInterval(cargar, 20000);
  if (!canalRT) {
    canalRT = sb.channel('reservas-rt')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'reservations' }, () => cargar())
      .subscribe();
  }
}
function detenerTiempoReal() {
  if (intervalo) { clearInterval(intervalo); intervalo = null; }
  if (canalRT) { sb.removeChannel(canalRT); canalRT = null; }
}

const hoyPeru = () => new Date().toLocaleDateString('en-CA', { timeZone: 'America/Lima' });

function animarNumero(el, to) {
  const from = parseInt(el.textContent.replace(/\D/g, '')) || 0;
  if (from === to) { el.textContent = to; return; }
  const t0 = performance.now(), dur = 650;
  const step = (t) => {
    const p = Math.min((t - t0) / dur, 1);
    const e = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(from + (to - from) * e);
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

async function cargar() {
  const [{ data: reservas }, { data: porDia }] = await Promise.all([
    sb.from('v_reservas').select('*').order('fecha_hora', { ascending: true }),
    sb.from('v_reservas_por_dia').select('*').order('fecha', { ascending: true }),
  ]);
  const r = reservas || [];
  renderKpis(r); renderEstado(r); renderDias(porDia || []); renderTabla(r);
  $('updated').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-PE', { timeZone: 'America/Lima', hour: '2-digit', minute: '2-digit' });
}

function renderKpis(r) {
  const hoy = hoyPeru();
  const resHoy = r.filter(x => x.fecha === hoy);
  const vals = {
    'k-hoy': resHoy.length,
    'k-com': resHoy.reduce((s, x) => s + (x.personas || 0), 0),
    'k-pen': r.filter(x => x.estado === 'pendiente').length,
    'k-con': r.filter(x => x.estado === 'confirmada').length,
  };
  if (!kpisBuilt) {
    const defs = [
      { id: 'k-hoy', label: 'Reservas hoy', ic: '📅', cls: '' },
      { id: 'k-com', label: 'Comensales hoy', ic: '👥', cls: '' },
      { id: 'k-pen', label: 'Pendientes', ic: '🕒', cls: 'amber' },
      { id: 'k-con', label: 'Confirmadas', ic: '✓', cls: 'green' },
    ];
    $('kpis').innerHTML = defs.map((d, i) =>
      `<div class="kpi" style="animation-delay:${(i * 0.06).toFixed(2)}s"><div class="label"><span class="ic">${d.ic}</span>${d.label}</div><div class="value ${d.cls}" id="${d.id}">0</div></div>`
    ).join('');
    kpisBuilt = true;
  }
  for (const [id, to] of Object.entries(vals)) animarNumero($(id), to);
}

function renderEstado(r) {
  const counts = {};
  r.forEach(x => counts[x.estado] = (counts[x.estado] || 0) + 1);
  const keys = Object.keys(ESTADOS).filter(k => counts[k]);
  const labels = keys.map(k => ESTADOS[k].label);
  const data = keys.map(k => counts[k]);
  const colors = keys.map(k => ESTADOS[k].color);
  $('estadoLegend').innerHTML = keys.map(k =>
    `<span><span class="dot" style="background:${ESTADOS[k].color}"></span>${ESTADOS[k].label} ${counts[k]}</span>`).join('') || '<span>Sin datos aún</span>';
  if (chartEstado) { chartEstado.data.labels = labels; chartEstado.data.datasets[0].data = data; chartEstado.data.datasets[0].backgroundColor = colors; chartEstado.update(); return; }
  chartEstado = new Chart($('chartEstado'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '64%', plugins: { legend: { display: false } } }
  });
}

function renderDias(porDia) {
  const last = porDia.slice(-14);
  const labels = last.map(d => new Date(d.fecha + 'T00:00:00').toLocaleDateString('es-PE', { day: '2-digit', month: 'short' }));
  const data = last.map(d => Number(d.total_reservas) || 0);
  if (chartDias) { chartDias.data.labels = labels; chartDias.data.datasets[0].data = data; chartDias.update(); return; }
  chartDias = new Chart($('chartDias'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Reservas', data, backgroundColor: '#C99B4E', borderRadius: 6, maxBarThickness: 30 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0, color: '#8A847A' }, grid: { color: '#EFEBE3' } }, x: { ticks: { color: '#8A847A' }, grid: { display: false } } } }
  });
}

function renderTabla(r) {
  const hoy = hoyPeru();
  const prox = r.filter(x => x.fecha >= hoy).slice(0, 40);
  if (!prox.length) { $('tablaWrap').innerHTML = '<div class="empty">No hay reservas para hoy ni próximas.</div>'; return; }
  const filas = prox.map(x => {
    const fecha = new Date(x.fecha_hora).toLocaleDateString('es-PE', { weekday: 'short', day: '2-digit', month: 'short' });
    const est = ESTADOS[x.estado] || { label: x.estado };
    return `<tr><td class="name">${x.cliente || '—'}</td><td>${fecha}</td><td>${x.hora}</td><td>${x.personas}</td><td><span class="badge b-${x.estado}">${est.label}</span></td><td>${accionesHTML(x)}</td></tr>`;
  }).join('');
  $('tablaWrap').innerHTML = `<table><thead><tr><th>Cliente</th><th>Fecha</th><th>Hora</th><th>Personas</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>${filas}</tbody></table>`;
}

function accionesHTML(x) {
  const id = x.id;
  if (x.estado === 'pendiente') {
    return '<div class="acciones">'
      + `<button class="btn-act confirmar" data-accion="confirmada" data-id="${id}">Confirmar</button>`
      + `<button class="btn-act cancelar" data-accion="cancelada" data-id="${id}">Cancelar</button>`
      + '</div>';
  }
  if (x.estado === 'confirmada') {
    return '<div class="acciones">'
      + `<button class="btn-act completar" data-accion="completada" data-id="${id}">Completar</button>`
      + `<button class="btn-act cancelar" data-accion="cancelada" data-id="${id}">Cancelar</button>`
      + '</div>';
  }
  return '<span class="acciones-none">—</span>';
}

$('tablaWrap').addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-accion]');
  if (!btn) return;
  const { accion, id } = btn.dataset;
  if (accion === 'cancelada' && !confirm('¿Seguro que quieres cancelar esta reserva?')) return;
  const grupo = btn.closest('.acciones');
  grupo.querySelectorAll('button').forEach(b => b.disabled = true);
  const { error } = await sb.from('reservations').update({ status: accion }).eq('id', id);
  if (error) {
    grupo.querySelectorAll('button').forEach(b => b.disabled = false);
    alert('No se pudo actualizar la reserva: ' + error.message);
    return;
  }
  cargar();
});

init();
</script>
</body>
</html>
